<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f0f8ff" />
  <meta name="description" content="Convertí consumo de combustible entre km/l y l/100km" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Conversor" />
  <title>Conversor by Ariel Ferro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f8ff;
      --surface: #ffffff;
      --surface2: #e1f0fb;
      --border: rgba(0,120,200,0.1);
      --border2: rgba(0,120,200,0.2);
      --text: #0d2d4a;
      --muted: #6a9ab8;
      --accent: #0090d4;
      --accent-dim: rgba(0,144,212,0.1);
      --accent-text: #ffffff;
      --red: #e05555;
      --teal: #0aa8a8;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-name {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .install-btn {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 999px;
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }
    .install-btn.visible { display: block; }
    .install-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px 20px 24px;
      gap: 12px;
    }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      background: var(--surface);
      border-radius: 12px;
      border: 0.5px solid var(--border);
      padding: 4px;
      gap: 4px;
    }
    .mode-btn {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      padding: 10px 8px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.02em;
    }
    .mode-btn.active {
      background: var(--accent);
      color: var(--accent-text);
    }

    /* ── Input card ── */
    .input-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 20px 20px 16px;
      transition: border-color 0.2s;
    }
    .input-card.focused { border-color: var(--accent); }
    .input-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #333333;
      margin-bottom: 10px;
    }
    .input-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    #main-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-mono);
      font-size: 48px;
      font-weight: 400;
      color: var(--text);
      min-width: 0;
      -webkit-appearance: none;
      appearance: none;
    }
    #main-input::placeholder { color: #c8dfef; }
    .input-unit {
      font-family: var(--font-mono);
      font-size: 15px;
      color: var(--muted);
      white-space: nowrap;
      padding-bottom: 6px;
    }

    /* ── Arrow ── */
    .arrow-row {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .arrow-circle {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--surface2);
      border: 0.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.2s;
    }
    .arrow-circle:active { transform: scale(0.9); background: var(--accent-dim); }

    /* ── Result card ── */
    .result-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 20px 20px 16px;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .result-card.has-value::before { transform: scaleX(1); }
    .result-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #333333;
      margin-bottom: 10px;
    }
    #result-value {
      font-family: var(--font-mono);
      font-size: 48px;
      font-weight: 400;
      color: var(--accent);
      transition: color 0.2s;
      letter-spacing: -0.02em;
    }
    .result-card:not(.has-value) #result-value { color: #c8dfef; }
    #result-unit {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Quick examples ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
    }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 7px 13px;
      border-radius: 999px;
      border: 0.5px solid var(--border2);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { color: var(--text); border-color: rgba(0,144,212,0.4); background: var(--accent-dim); }
    .chip:active { transform: scale(0.95); }

    /* ── Dual display ── */
    .dual {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }
    .dual-item {
      background: var(--surface2);
      border-radius: 14px;
      padding: 12px 14px;
    }
    .dual-val {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }
    .dual-lbl {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── No input state ── */
    .empty-hint {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 8px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="12" r="3" fill="#ffffff"/>
        <path d="M9 2v3M5 4l2 2M13 4l-2 2" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="4" y="9" width="10" height="7" rx="2" stroke="#ffffff" stroke-width="1.3" fill="none"/>
      </svg>
    </div>
    <span class="logo-name">Conversor by Ariel Ferro</span>
  </div>
  <button class="install-btn" id="install-btn">+ Instalar</button>
</div>

<main>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-kml" onclick="setMode('kml')">km/l → l/100km</button>
    <button class="mode-btn" id="btn-l100" onclick="setMode('l100')">l/100km → km/l</button>
  </div>

  <div class="input-card" id="input-card">
    <div class="input-label" id="input-label">Consumo en km/l</div>
    <div class="input-row">
      <input type="number" id="main-input" placeholder="0" min="0.1" step="0.1" inputmode="decimal" autofocus />
      <span class="input-unit" id="input-unit">km/l</span>
    </div>
  </div>

  <div class="arrow-row">
    <div class="arrow-circle" onclick="swapMode()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M5 4v10M5 14l-2-2M5 14l2-2M13 14V4M13 4l-2 2M13 4l2 2" stroke="#6b7080" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-label" id="result-label">Resultado en l/100km</div>
    <div id="result-value">—</div>
    <div id="result-unit">litros cada 100 km</div>
  </div>

  <div id="dual-display" class="dual" style="display:none;">
    <div class="dual-item">
      <div class="dual-val" id="dual-kml">—</div>
      <div class="dual-lbl">km/l</div>
    </div>
    <div class="dual-item">
      <div class="dual-val" id="dual-l100">—</div>
      <div class="dual-lbl">l/100km</div>
    </div>
  </div>

  <div id="badge" style="display:none; border-radius: 16px; padding: 18px; text-align: center; transition: background 0.3s;">
    <span id="badge-text" style="font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: 0.05em;"></span>
  </div>

</main>

<script>
const examples = [
  { label: 'Auto ciudad', kml: 10 },
  { label: 'Auto ruta', kml: 14 },
  { label: 'SUV', kml: 8 },
  { label: 'Moto', kml: 20 },
  { label: 'Camión', kml: 4 },
  { label: 'Deportivo', kml: 6 },
];

let mode = 'kml';

const inputEl = document.getElementById('main-input');
const inputLabel = document.getElementById('input-label');
const inputUnit = document.getElementById('input-unit');
const inputCard = document.getElementById('input-card');
const resultCard = document.getElementById('result-card');
const resultLabel = document.getElementById('result-label');
const resultValue = document.getElementById('result-value');
const resultUnit = document.getElementById('result-unit');
const dualDisplay = document.getElementById('dual-display');
const dualKml = document.getElementById('dual-kml');
const dualL100 = document.getElementById('dual-l100');
const btnKml = document.getElementById('btn-kml');
const btnL100 = document.getElementById('btn-l100');

function convert() {
  const val = parseFloat(inputEl.value);
  const badge = document.getElementById('badge');
  const badgeText = document.getElementById('badge-text');
  if (!val || val <= 0) {
    resultValue.textContent = '—';
    resultCard.classList.remove('has-value');
    dualDisplay.style.display = 'none';
    badge.style.display = 'none';
    return;
  }
  const res = 100 / val;
  resultValue.textContent = res.toFixed(2);
  resultCard.classList.add('has-value');
  dualDisplay.style.display = 'grid';
  if (mode === 'kml') {
    dualKml.textContent = val.toFixed(2);
    dualL100.textContent = res.toFixed(2);
  } else {
    dualL100.textContent = val.toFixed(2);
    dualKml.textContent = res.toFixed(2);
  }
  // Badge según l/100km
  const l100 = res;
  badge.style.display = 'block';
  if (l100 < 6) {
    badge.style.background = '#22c55e';
    badgeText.style.color = '#ffffff';
    badgeText.textContent = '✓ BUEN CONSUMO';
  } else if (l100 <= 9) {
    badge.style.background = '#facc15';
    badgeText.style.color = '#1a1a1a';
    badgeText.textContent = '~ CONSUMO NORMAL';
  } else if (l100 > 11) {
    badge.style.background = '#ef4444';
    badgeText.style.color = '#ffffff';
    badgeText.textContent = '⚠ LEVANTA LA PATA';
  } else {
    badge.style.display = 'none';
  }
}

function setMode(m) {
  mode = m;
  inputEl.value = '';
  resultValue.textContent = '—';
  resultCard.classList.remove('has-value');
  dualDisplay.style.display = 'none';
  document.getElementById('badge').style.display = 'none';
  btnKml.classList.toggle('active', m === 'kml');
  btnL100.classList.toggle('active', m === 'l100');
  if (m === 'kml') {
    inputLabel.textContent = 'Consumo en km/l';
    inputUnit.textContent = 'km/l';
    resultLabel.textContent = 'Resultado en l/100km';
    resultUnit.textContent = 'litros cada 100 km';
  } else {
    inputLabel.textContent = 'Consumo en l/100km';
    inputUnit.textContent = 'l/100km';
    resultLabel.textContent = 'Resultado en km/l';
    resultUnit.textContent = 'kilómetros por litro';
  }
  inputEl.focus();
}

function swapMode() {
  setMode(mode === 'kml' ? 'l100' : 'kml');
}

inputEl.addEventListener('input', convert);
inputEl.addEventListener('focus', () => inputCard.classList.add('focused'));
inputEl.addEventListener('blur', () => inputCard.classList.remove('focused'));

// PWA Install prompt
let deferredPrompt = null;
const installBtn = document.getElementById('install-btn');
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.add('visible');
});
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') installBtn.classList.remove('visible');
  deferredPrompt = null;
});
window.addEventListener('appinstalled', () => {
  installBtn.classList.remove('visible');
});

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
